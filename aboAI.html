<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>ABO± AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        (function(){
            try {
                var t = localStorage.getItem('theme') || 'dark';
                document.documentElement.setAttribute('data-theme', t);
            } catch(e) {}
        })();
    </script>
    <link rel="stylesheet" href="abostyles.css">
</head>
<body>
 
<div class="sidebar-overlay" id="sidebarOverlay"></div>
 
<div class="sidebar" id="sidebar">
    <div class="logo-wrap">
        <div class="logo-mark">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C12 2 5 9.5 5 14.5C5 18.09 8.13 21 12 21C15.87 21 19 18.09 19 14.5C19 9.5 12 2 12 2Z" fill="white" fill-opacity="0.9"/>
                <path d="M9 14C9 14 9.5 17 12 17C14.5 17 15 14 15 14" stroke="rgba(200,16,46,1)" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </div>
        <span class="logo-name"><span>ABO±</span> AI</span>
    </div>
 
    <div class="sidebar-actions">
        <button class="btn btn-primary" onclick="startNewChat()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Chat
        </button>
        <button class="btn" onclick="clearAllHistory()">
            <svg class="trash-icon" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                <path class="bin-body" d="M 25 35 L 75 35 L 70 105 A 5 5 0 0 1 65 110 L 35 110 A 5 5 0 0 1 30 105 Z"/>
                <rect class="lid" x="15" y="27" width="70" height="8" rx="4"/>
                <path class="handle" d="M 42 27 L 58 27 L 55 18 L 45 18 Z"/>
            </svg>
            Wipe All History
        </button>
    </div>
 
    <div class="section-label">Timeline Ledger</div>
    <div class="history-container" id="historyContainer">
        <div class="history-empty" id="historyEmpty">No conversations yet.<br>Start chatting below.</div>
    </div>
</div>
 
<div class="main-chat">
    <div class="header">
        <button class="mobile-menu-toggle" id="menuToggle" aria-label="Open sidebar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
        <div class="header-title">ABO± AI Assistant</div>
        <div class="header-actions">
            <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="12" cy="12" r="4"/>
                    <line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
                    <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
                    <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
                </svg>
            </button>
        </div>
    </div>
 
    <div class="chat-window" id="chatWindow">
        <div class="welcome-screen" id="welcomeScreen">
            <div class="welcome-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2C12 2 5 9.5 5 14.5C5 18.09 8.13 21 12 21C15.87 21 19 18.09 19 14.5C19 9.5 12 2 12 2Z"/>
                </svg>
            </div>
            <div class="welcome-title">ABO± AI Assistant</div>
            <div class="welcome-sub" id="welcomeGreeting">Your intelligent guide to blood types, donation eligibility, and transfusion compatibility.</div>
            <div class="welcome-chips">
                <div class="welcome-chip" onclick="sendQuickMessage('What are the blood types?')">Blood Types</div>
                <div class="welcome-chip" onclick="sendQuickMessage('Who can O negative donate to?')">O− Compatibility</div>
                <div class="welcome-chip" onclick="sendQuickMessage('Am I eligible to donate blood?')">Eligibility Check</div>
                <div class="welcome-chip" onclick="sendQuickMessage('What is the Rh factor?')">Rh Factor</div>
                <div class="welcome-chip" onclick="sendQuickMessage('What is the rarest blood type?')">Rarest Type</div>
                <div class="welcome-chip" onclick="sendQuickMessage('Can I donate after a tattoo?')">Tattoo Rules</div>
            </div>
        </div>
    </div>
 
    <div class="input-area">
        <div class="quick-actions">
            <button class="quick-btn" onclick="sendQuickMessage('Am I eligible to donate blood?')">Eligibility</button>
            <button class="quick-btn" onclick="sendQuickMessage('What blood types exist?')">Blood Types</button>
            <button class="quick-btn" onclick="sendQuickMessage('Who can receive O negative blood?')">O− Donors</button>
            <button class="quick-btn" onclick="sendQuickMessage('What is the universal donor?')">Universal Donor</button>
            <button class="quick-btn" onclick="sendQuickMessage('Can I donate after a tattoo?')">Tattoo Rules</button>
            <button class="quick-btn" onclick="sendQuickMessage('What is the rarest blood type?')">Rare Types</button>
        </div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Ask about blood types, donation rules, compatibility…" autocomplete="off" onkeypress="handleEnter(event)">
            <button class="send-btn" onclick="processUserInput()" aria-label="Send">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>
    </div>
</div>
 
<script src="aboscript.js"></script>
</body>
</html>
